<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP - L'Union Brûlente</title>
    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&family=Teko:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #2a2122;
            --bg-light: #948285;
            --black: #0a0a0a;
            --white: #f4f4f4;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Teko', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-light) 100%);
            color: var(--black);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: var(--bg-light);
            background: linear-gradient(to bottom right, #b8a6a8, #756466);
            width: 90%;
            max-width: 500px;
            border: 8px solid var(--black);
            padding: 20px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.8);
            position: relative;
        }

        .header-box {
            background-color: var(--black);
            color: var(--white);
            padding: 15px;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        h1 {
            margin: 0;
            font-size: 2.5em;
            text-transform: uppercase;
        }

        h2 {
            margin: 0;
            font-size: 1.8em;
            color: var(--black);
            text-align: center;
            border-bottom: 4px solid var(--black);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 1.5em;
            margin-bottom: 5px;
            font-weight: 700;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 1.2em;
            font-family: 'Teko', sans-serif;
            border: 3px solid var(--black);
            background-color: var(--white);
            box-sizing: border-box;
            outline: none;
        }

        input[type="text"]:focus {
            background-color: #e0d5d6;
        }

        .radio-group {
            background-color: var(--black);
            color: var(--white);
            padding: 15px;
            border: 3px solid var(--black);
            margin-top: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 1.4em;
            cursor: pointer;
        }

        /* --- STYLES CUSTOM POUR LES BOUTONS RADIO (La main cornue 🤘) --- */
        .radio-option input[type="radio"] {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            background-color: var(--white);
            border: 2px solid var(--bg-light);
            border-radius: 4px;
            margin-right: 15px;
            position: relative;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .radio-option input[type="radio"]:checked {
            background-color: var(--white);
            border-color: var(--white);
            box-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .radio-option input[type="radio"]:checked::after {
            content: "🤘";
            font-size: 20px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -45%); /* Ajustement pour bien centrer l'emoji */
        }
        /* ----------------------------------------------------------------- */

        button {
            width: 100%;
            padding: 15px;
            font-size: 1.8em;
            font-family: 'Teko', sans-serif;
            background-color: var(--black);
            color: var(--white);
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--white);
            color: var(--black);
            border: 4px solid var(--black);
        }

        .signature {
            font-family: 'Rock Salt', cursive;
            text-align: right;
            font-size: 0.8em;
            margin-top: 30px;
            color: var(--black);
        }

        /* Message de confirmation caché par défaut */
        #confirmation-message {
            display: none;
            text-align: center;
            font-size: 2em;
            padding: 40px 20px;
        }

        /* Sections cachées par défaut */
        #accompagnement-section, #noms-accompagnants-group {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="form-section">
            <div class="header-box">
                <h1>L'Union Inattendue</h1>
            </div>
            
            <h2>Marie-Constance & Sébastien</h2>

            <form id="rsvp-form" action="https://formspree.io/f/mnjgzvdn" method="POST">
                <div class="form-group">
                    <label for="prenom">PRÉNOM</label>
                    <input type="text" id="prenom" name="prenom" required>
                </div>

                <div class="form-group">
                    <label for="nom">NOM</label>
                    <input type="text" id="nom" name="nom" required>
                </div>

                <div class="form-group">
                    <label>PRÉSENCE LE 11 JUILLET 2026</label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="presence" value="oui" required>
                            Sera de la partie
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="presence" value="non">
                            Ne vient pas
                        </label>
                    </div>
                </div>

                <div id="accompagnement-section">
                    <div class="form-group">
                        <label>ACCOMPAGNEMENT</label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="accompagnement" value="seul">
                                Viens seul(e)
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="accompagnement" value="accompagne">
                                Viens accompagné(e)
                            </label>
                        </div>
                    </div>

                    <div class="form-group" id="noms-accompagnants-group">
                        <label for="noms_accompagnants">NOMS DES PERSONNES QUI VOUS ACCOMPAGNENT</label>
                        <input type="text" id="noms_accompagnants" name="noms_accompagnants" placeholder="Ex: Jean et Jeanne Dupont">
                    </div>
                </div>

                <button type="submit">Confirmer</button>
            </form>

            <div class="signature">
                You Are My Burning Desire
            </div>
        </div>

        <div id="confirmation-message">
            <p><strong>MERCI !</strong></p>
            <p>Votre réponse a bien été envoyée dans les flammes... (et dans notre boîte mail).</p>
            <div class="signature" style="text-align: center; margin-top: 20px;">
                À très vite.
            </div>
        </div>
    </div>

    <script>
        // Gestion de l'affichage des sections dynamiques
        const presenceRadios = document.querySelectorAll('input[name="presence"]');
        const accompSection = document.getElementById('accompagnement-section');
        const accompRadios = document.querySelectorAll('input[name="accompagnement"]');
        
        const nomsAccompGroup = document.getElementById('noms-accompagnants-group');
        const nomsAccompInput = document.getElementById('noms_accompagnants');

        // 1. Gérer l'affichage de la section Accompagnement (uniquement si "Sera de la partie")
        presenceRadios.forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.value === 'oui') {
                    accompSection.style.display = 'block';
                    accompRadios.forEach(r => r.required = true); // Rend le choix obligatoire
                } else {
                    accompSection.style.display = 'none';
                    accompRadios.forEach(r => {
                        r.required = false;
                        r.checked = false;
                    });
                    nomsAccompGroup.style.display = 'none';
                    nomsAccompInput.required = false;
                    nomsAccompInput.value = '';
                }
            });
        });

        // 2. Gérer l'affichage du champ texte pour les noms des accompagnants
        accompRadios.forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.value === 'accompagne') {
                    nomsAccompGroup.style.display = 'block';
                    nomsAccompInput.required = true; // Rend le nom obligatoire
                } else {
                    nomsAccompGroup.style.display = 'none';
                    nomsAccompInput.required = false;
                    nomsAccompInput.value = '';
                }
            });
        });

        // Soumission du formulaire Formspree
        var form = document.getElementById("rsvp-form");
        
        async function handleSubmit(event) {
            event.preventDefault();
            
            var status = document.getElementById("confirmation-message");
            var formSection = document.getElementById("form-section");
            var data = new FormData(event.target);
            
            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    formSection.style.display = 'none';
                    status.style.display = 'block';
                    form.reset();
                } else {
                    alert("Oups ! Il y a eu un problème lors de l'envoi de ta réponse. Réessaie plus tard.");
                }
            }).catch(error => {
                alert("Oups ! Il y a eu un problème lors de l'envoi de ta réponse. Réessaie plus tard.");
            });
        }
        
        form.addEventListener("submit", handleSubmit);
    </script>

</body>
</html>
