<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Union Inattendue</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rock+Salt&family=Teko:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Couleurs extraites de ton affiche originale */
            --blue-dark: #67696a;
            --blue-light: #7ab2d6;
            --blue-mid: #575b5e;
            --black: #0c0c0c;
            --white: #f2f2f2;
            --grey: #b5b5b5;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Teko', sans-serif;
            color: var(--black);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            
            /* FOND : Dégradé bleu de ton affiche + filtre grunge/bruit subtil (zéro rond) */
            background: 
                /* Texture de bruit/usure */
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.25'/%3E%3C/svg%3E"),
                /* Dégradé bleu original */
                linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-light) 40%, var(--blue-mid) 100%);
            background-blend-mode: overlay, normal;
        }

        .container {
            background-color: var(--white);
            /* Texture très légère sur le papier */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.5' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            width: 100%;
            max-width: 550px;
            border: 8px solid var(--black);
            padding: 40px 30px;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.85);
            position: relative;
        }

        /* La date en haut à droite (style étiquette) */
        .date-box {
            position: absolute;
            top: -20px;
            right: 20px;
            background-color: var(--black);
            color: var(--white);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2em;
            padding: 5px 20px;
            letter-spacing: 2px;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.5);
        }

        /* Bloc Titre Noir */
        .header-box {
            background-color: var(--black);
            color: var(--white);
            padding: 10px 20px;
            text-align: left;
            margin-top: 10px;
            margin-bottom: 5px;
            display: inline-block;
            width: calc(100% + 20px);
            margin-left: -20px;
        }

        h1 {
            margin: 0;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5em;
            letter-spacing: 3px;
        }

        h2 {
            margin: 0;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.8em;
            color: var(--black);
            text-align: right;
            line-height: 1;
            margin-bottom: 35px;
            letter-spacing: 1px;
            padding-bottom: 10px;
            border-bottom: 5px solid var(--black);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 1.6em;
            margin-bottom: 5px;
            font-weight: 700;
            text-transform: uppercase;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 1.4em;
            font-family: 'Teko', sans-serif;
            border: 4px solid var(--black);
            background-color: var(--white);
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            background-color: var(--black);
            color: var(--white);
        }

        .radio-group {
            background-color: var(--black);
            color: var(--white);
            padding: 15px;
            border: 4px solid var(--black);
            margin-top: 5px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 1.5em;
            cursor: pointer;
        }

        /* --- BOUTONS RADIO MAISON (Main 🤘 Noire) --- */
        .radio-option input[type="radio"] {
            -webkit-appearance: none;
            appearance: none;
            width: 32px;
            height: 32px;
            background-color: var(--white);
            border: 3px solid var(--grey);
            border-radius: 0; /* Carré strict */
            margin-right: 15px;
            position: relative;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .radio-option input[type="radio"]:checked {
            background-color: var(--white);
            border-color: var(--white);
            box-shadow: 0 0 8px rgba(255,255,255,0.8);
        }

        .radio-option input[type="radio"]:checked::after {
            content: "🤘";
            font-size: 22px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -45%);
            /* Ces filtres rendent l'emoji totalement noir */
            filter: brightness(0) saturate(100%);
            color: transparent;
            text-shadow: 0 0 0 var(--black);
        }
        /* ------------------------------------------------ */

        button {
            width: 100%;
            padding: 15px;
            font-size: 2.2em;
            font-family: 'Bebas Neue', sans-serif;
            background-color: var(--black);
            color: var(--white);
            border: 4px solid var(--black);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            margin-top: 20px;
        }

        button:hover {
            background-color: var(--white);
            color: var(--black);
            box-shadow: 6px 6px 0px rgba(0,0,0,1);
            transform: translate(-4px, -4px);
        }

        .signature {
            font-family: 'Rock Salt', cursive;
            text-align: left;
            font-size: 1em;
            margin-top: 40px;
            color: var(--black);
            transform: rotate(-3deg);
        }

        #confirmation-message {
            display: none;
            text-align: center;
            font-size: 2em;
            padding: 40px 20px;
        }

        #accompagnement-section, #noms-accompagnants-group {
            display: none;
        }

        @media (max-width: 500px) {
            h1 { font-size: 2.5em; }
            h2 { font-size: 2em; }
            .date-box { font-size: 1.5em; top: -15px; right: 10px; }
            .header-box { margin-left: -10px; width: calc(100% + 10px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="date-box">11 JUILLET 2026</div>

        <div id="form-section">
            <div class="header-box">
                <h1>L'UNION INATTENDUE</h1>
            </div>
            
            <h2>MARIE-CONSTANCE<br>& SÉBASTIEN</h2>

            <form id="rsvp-form" action="https://formspree.io/f/mnjgzvdn" method="POST">
                <div class="form-group">
                    <label for="prenom">PRÉNOM</label>
                    <input type="text" id="prenom" name="prenom" required>
                </div>

                <div class="form-group">
                    <label for="nom">NOM</label>
                    <input type="text" id="nom" name="nom" required>
                </div>

                <div class="form-group">
                    <label>PRÉSENCE LE 11 JUILLET 2026</label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="presence" value="oui" required>
                            Sera de la partie
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="presence" value="non">
                            Ne vient pas
                        </label>
                    </div>
                </div>

                <div id="accompagnement-section">
                    <div class="form-group">
                        <label>ACCOMPAGNEMENT</label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="accompagnement" value="seul">
                                Viens seul(e)
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="accompagnement" value="accompagne">
                                Viens accompagné(e)
                            </label>
                        </div>
                    </div>

                    <div class="form-group" id="noms-accompagnants-group">
                        <label for="noms_accompagnants">NOMS DES PERSONNES QUI VOUS ACCOMPAGNENT</label>
                        <input type="text" id="noms_accompagnants" name="noms_accompagnants" placeholder="Ex: Jean et Jeanne Dupont">
                    </div>
                </div>

                <button type="submit">Confirmer</button>
            </form>

            <div class="signature">
                You Are My Burning Desire
            </div>
        </div>

        <div id="confirmation-message">
            <p style="font-family: 'Bebas Neue', sans-serif; font-size: 2.5em; margin-bottom: 0; letter-spacing: 2px;">MERCI !</p>
            <p style="font-size: 0.8em; margin-top: 10px;">Votre réponse a bien été envoyée dans les flammes... (et dans notre boîte mail).</p>
            <div class="signature" style="text-align: center; margin-top: 30px; transform: none;">
                À très vite <span style="filter: brightness(0) saturate(100%); color: transparent; text-shadow: 0 0 0 #000;">🤘</span>
            </div>
        </div>
    </div>

    <script>
        const presenceRadios = document.querySelectorAll('input[name="presence"]');
        const accompSection = document.getElementById('accompagnement-section');
        const accompRadios = document.querySelectorAll('input[name="accompagnement"]');
        const nomsAccompGroup = document.getElementById('noms-accompagnants-group');
        const nomsAccompInput = document.getElementById('noms_accompagnants');

        // Gestion de la présence
        presenceRadios.forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.value === 'oui') {
                    accompSection.style.display = 'block';
                    accompRadios.forEach(r => r.required = true);
                } else {
                    accompSection.style.display = 'none';
                    accompRadios.forEach(r => {
                        r.required = false;
                        r.checked = false;
                    });
                    nomsAccompGroup.style.display = 'none';
                    nomsAccompInput.required = false;
                    nomsAccompInput.value = '';
                }
            });
        });

        // Gestion de l'accompagnement
        accompRadios.forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.value === 'accompagne') {
                    nomsAccompGroup.style.display = 'block';
                    nomsAccompInput.required = true;
                } else {
                    nomsAccompGroup.style.display = 'none';
                    nomsAccompInput.required = false;
                    nomsAccompInput.value = '';
                }
            });
        });

        // Envoi du formulaire via Formspree
        var form = document.getElementById("rsvp-form");
        
        async function handleSubmit(event) {
            event.preventDefault();
            
            var status = document.getElementById("confirmation-message");
            var formSection = document.getElementById("form-section");
            var data = new FormData(event.target);
            
            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    formSection.style.display = 'none';
                    status.style.display = 'block';
                    form.reset();
                } else {
                    alert("Oups ! Il y a eu un problème lors de l'envoi de ta réponse. Réessaie plus tard.");
                }
            }).catch(error => {
                alert("Oups ! Il y a eu un problème lors de l'envoi de ta réponse. Réessaie plus tard.");
            });
        }
        
        form.addEventListener("submit", handleSubmit);
    </script>

</body>
</html>
